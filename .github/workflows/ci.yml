name: CI

# 7.1 CI Workflow — runs on every push to develop and on PRs targeting main.
on:
  push:
    branches: [develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install linters
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Lint source
        run: flake8 src/ --max-line-length=120 --extend-ignore=E203,W503

      - name: Byte-compile check
        run: python -m compileall src/
