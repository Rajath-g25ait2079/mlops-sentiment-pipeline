name: Inference

# 7.2 Inference Workflow — triggered manually from the Actions tab.
# Pulls the published Hugging Face model and classifies the text you enter.
on:
  workflow_dispatch:
    inputs:
      input_text:
        description: 'Text to classify'
        required: true
        default: 'This movie was fantastic!'

jobs:
  infer:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install inference dependencies (CPU PyTorch keeps it fast)
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt

      - name: Run inference
        env:
          # 7.3 Secrets — token is injected from repo secrets, never committed.
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_MODEL_NAME: Rajath-g25ait2079/distilbert-sst2-sentiment
          INPUT_TEXT: ${{ github.event.inputs.input_text }}
        run: python src/inference.py
